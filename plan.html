<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitForge — Твій план тренувань</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='4' fill='%230f172a'/%3E%3Cpath fill='%23B8F55A' d='M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z'/%3E%3C/svg%3E" />
  <link href="global.css" rel="stylesheet"/>
  <link href="styles/plan.css" rel="stylesheet"/>
</head>
<body>
  <div class="site-wrapper">

    <picture>
      <source srcset="images/backDecstop.png" media="(min-width: 768px)"/>
      <img alt="Фон" class="hero-bg" src="images/backMobile.png"/>
    </picture>
    <div class="hero-overlay"></div>

    <nav class="navbar scrolled" id="navbar">
      <div class="navbar-inner">
        <a href="index.html" class="nav-logo">FIT<span>FORGE</span></a>
        <div class="nav-links">
          <a href="index.html" class="nav-link">Головна</a>
          <a href="form.html" class="nav-link">Програма</a>
        </div>
        <button class="burger" id="burger" aria-label="Меню">
          <span></span><span></span><span></span>
        </button>
      </div>
      <div class="mobile-menu" id="mobile-menu">
        <a href="index.html" class="mobile-link">Головна</a>
        <a href="form.html" class="mobile-link">Програма</a>
      </div>
    </nav>

    <!-- Loading screen -->
    <div class="loading-screen" id="loading-screen">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <p class="loading-msg" id="loading-msg">Підбираємо вправи...</p>
        <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
      </div>
    </div>

    <!-- Main plan content -->
    <main class="plan-main" id="plan-main" style="display:none">

      <!-- Header summary -->
      <div class="plan-header">
        <div class="plan-header-inner">
          <div class="plan-header-left">
            <span class="plan-label">Персональний план</span>
            <h1 class="plan-title" id="plan-title">Твоя програма</h1>
            <p class="plan-summary" id="plan-summary"></p>
          </div>
          <div class="plan-header-right">
            <a href="form.html" class="btn-ghost plan-edit-btn">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 1.5l3 3L4 13H1v-3L9.5 1.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Змінити
            </a>
          </div>
        </div>
      </div>

      <!-- Week tabs (desktop) -->
      <div class="week-tabs" id="week-tabs"></div>

      <!-- Days grid -->
      <div class="days-container" id="days-container"></div>

      <!-- Export bar -->
      <div class="export-bar">
        <button class="btn-ghost export-btn" id="btn-pdf">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 2h6l3 3v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 2v4h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 9h6M5 11.5h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Завантажити PDF
        </button>
        <button class="btn-ghost export-btn" id="btn-ics">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="11" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M1.5 7h13M5 1.5V4M11 1.5V4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          В календар (.ics)
        </button>
        <button class="btn-ghost export-btn" id="btn-share">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="12" cy="3" r="1.5" stroke="currentColor" stroke-width="1.3"/><circle cx="12" cy="13" r="1.5" stroke="currentColor" stroke-width="1.3"/><circle cx="3" cy="8" r="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M10.5 3.75L4.5 7.25M4.5 8.75l6 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          Поділитись
        </button>
      </div>

    </main>

    <!-- Exercise Modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="modal">
        <button class="modal-close" id="modal-close">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
  </div>

  <script src="js/plan.js"></script>
  <script>
    const burger = document.getElementById('burger');
    const menu   = document.getElementById('mobile-menu');
    burger.addEventListener('click', () => {
      burger.classList.toggle('open');
      menu.classList.toggle('open');
    });
  </script>
</body>
</html>
